name: Daily Reel Upload

on:
  schedule:
    - cron: '30 3 * * *'  # Runs daily at 9:00 AM IST (03:30 UTC)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      IG_USERNAME: ${{ secrets.IG_USERNAME }}
      IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
      DRIVE_FOLDER_IDS: ${{ secrets.DRIVE_FOLDER_IDS }}
      GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
      IG_SESSION: ${{ secrets.IG_SESSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure posted.json exists
        run: |
          if [ ! -f posted.json ]; then
            echo "[]" > posted.json
          fi

      - name: Run script
        run: python main.py

      - name: Commit and force push updated posted.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted.json
          git commit -m "Update posted.json after daily reel upload" || echo "No changes to commit"
          git push origin main --force
