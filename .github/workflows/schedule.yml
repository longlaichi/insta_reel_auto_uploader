name: Daily Reel Upload

on:
  schedule:
    - cron: '50 14 * * *'  # Runs daily at 8:20 PM IST (14:50 UTC)
  workflow_dispatch:       # Allows manual trigger

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      IG_USERNAME: ${{ secrets.IG_USERNAME }}
      IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
      DRIVE_FOLDER_IDS: ${{ secrets.DRIVE_FOLDER_IDS }}
      GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
      IG_SESSION: ${{ secrets.IG_SESSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore posted.json if exists
        uses: actions/download-artifact@v4
        with:
          name: posted-json
        continue-on-error: true  # Ignore if first run (no artifact exists yet)

      - name: Run script
        run: python main.py

      - name: Save posted.json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: posted-json
          path: posted.json
